name: Raspberry Pi Zero

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  release:
    types: [ published ]

env:
  BUILD_TYPE: Release

jobs:
  build-pi-zero:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
        - buildtype: Debug
          system: armv6l
          crosscompiler: arm-linux-gnueabihf
          cmake_flags: "-mcpu=arm1176jzf-s -mfpu=vfp -mfloat-abi=hard"
          description: "Raspberry Pi Zero (Debug)"
          
        - buildtype: Release  
          system: armv6l
          crosscompiler: arm-linux-gnueabihf
          cmake_flags: "-mcpu=arm1176jzf-s -mfpu=vfp -mfloat-abi=hard"
          description: "Raspberry Pi Zero (Release)"

    name: Build for ${{ matrix.description }}

    steps:
    - name: Checkout repository
      run: |
        git clone --recursive --depth=1 ${{ github.server_url }}/${{ github.repository }}.git .
        git fetch origin ${{ github.sha }}
        git checkout ${{ github.sha }}
        git submodule update --init --recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          ca-certificates \
          xz-utils \
          cmake \
          make \
          pkg-config \
          git \
          g++-${{ matrix.crosscompiler }} \
          gcc-${{ matrix.crosscompiler }}

    - name: Configure CMake for Pi Zero
      run: |
        mkdir -p build
        cd build
        cmake \
          -DCMAKE_BUILD_TYPE=${{ matrix.buildtype }} \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_SYSTEM_PROCESSOR=${{ matrix.system }} \
          -DCMAKE_C_COMPILER=${{ matrix.crosscompiler }}-gcc \
          -DCMAKE_CXX_COMPILER=${{ matrix.crosscompiler }}-g++ \
          -DCMAKE_C_FLAGS="${{ matrix.cmake_flags }}" \
          -DCMAKE_CXX_FLAGS="${{ matrix.cmake_flags }}" \
          -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
          -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
          -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
          -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=ONLY \
          -DCMAKE_FIND_ROOT_PATH=/usr/${{ matrix.crosscompiler }} \
          -DWITH_SSL=OFF \
          -DALSA=OFF \
          -DSTATICSTDCPP=ON \
          ..

    - name: Build
      run: |
        cd build
        make -j$(nproc)
        ls -la

    - name: Create package
      run: |
        cd build  
        cpack
        ls -la *.deb || echo "No DEB packages found"
        
        # Prepare artifacts
        mkdir -p ../artifacts
        
        # Copy binary and web files
        cp v4l2rtspserver ../artifacts/ || echo "v4l2rtspserver not found"
        cp index.html ../artifacts/ 2>/dev/null || echo "index.html not found"
        cp hls.js ../artifacts/ 2>/dev/null || echo "hls.js not found"
        
        # Copy DEB package if exists
        if ls *.deb 1> /dev/null 2>&1; then
          cp *.deb ../artifacts/
          echo "DEB_PACKAGE=$(ls *.deb | head -1)" >> $GITHUB_ENV
        fi
        
        echo "ARTIFACT_NAME=v4l2rtspserver-${{ matrix.system }}-${{ matrix.buildtype }}" >> $GITHUB_ENV

    - name: Test binary
      run: |
        cd build
        file ./v4l2rtspserver || echo "Binary test failed"
        ${{ matrix.crosscompiler }}-readelf -h ./v4l2rtspserver || echo "ReadELF test failed"
        
    - name: Create release archive
      run: |
        cd artifacts
        tar -czf ../v4l2rtspserver-${{ matrix.system }}-${{ matrix.buildtype }}.tar.gz *
        echo "RELEASE_ARCHIVE=v4l2rtspserver-${{ matrix.system }}-${{ matrix.buildtype }}.tar.gz" >> $GITHUB_ENV

    - name: Upload to temporary storage (manual download)
      run: |
        echo "Artifacts created:"
        ls -la artifacts/
        echo ""
        echo "Release archive created:"
        ls -la *.tar.gz
        echo ""
        echo "To download artifacts, check the job logs and run the workflow"
        echo "Artifact name: ${{ env.ARTIFACT_NAME }}"
        
        # Create a simple upload script for manual use
        cat << 'EOF' > upload_instructions.txt
        Build completed successfully!
        
        Artifacts location: ./artifacts/
        Release archive: ./${{ env.RELEASE_ARCHIVE }}
        
        Files included:
        EOF
        ls -la artifacts/ >> upload_instructions.txt
        
        cat upload_instructions.txt

  create-docker-files:
    runs-on: ubuntu-latest
    needs: build-pi-zero
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout repository
      run: |
        git clone --depth=1 ${{ github.server_url }}/${{ github.repository }}.git .

    - name: Create Docker files for Pi Zero
      run: |
        # Create optimized Dockerfile for Pi Zero
        cat << 'EOF' > Dockerfile.pi-zero
        FROM arm32v6/alpine:latest
        
        # Install runtime dependencies
        RUN apk add --no-cache \
            libstdc++ \
            libgcc \
            ca-certificates \
            tzdata
        
        # Create application directory
        RUN mkdir -p /usr/local/share/v4l2rtspserver/
        
        # Copy binary (you need to manually copy this from artifacts)
        # COPY v4l2rtspserver /usr/local/bin/
        # COPY index.html /usr/local/share/v4l2rtspserver/
        # COPY hls.js /usr/local/share/v4l2rtspserver/
        
        # Make binary executable
        # RUN chmod +x /usr/local/bin/v4l2rtspserver
        
        # Create user for security
        RUN adduser -D -s /bin/sh v4l2rtsp
        
        # Expose RTSP port
        EXPOSE 8554
        
        # Health check
        HEALTHCHECK --interval=30s --timeout=10s --start-period=5s --retries=3 \
          CMD pgrep v4l2rtspserver || exit 1
        
        USER v4l2rtsp
        WORKDIR /home/v4l2rtsp
        
        ENTRYPOINT ["/usr/local/bin/v4l2rtspserver"]
        CMD ["-h"]
        EOF

        # Create build script for Docker
        cat << 'EOF' > build-pi-zero-docker.sh
        #!/bin/bash
        
        # Download artifacts from GitHub Actions first
        echo "1. Download artifacts from GitHub Actions"
        echo "2. Extract v4l2rtspserver binary, index.html, and hls.js"
        echo "3. Copy them to current directory"
        echo "4. Run this script"
        echo ""
        
        if [ ! -f "v4l2rtspserver" ]; then
            echo "Error: v4l2rtspserver binary not found!"
            echo "Please download it from GitHub Actions artifacts"
            exit 1
        fi
        
        # Update Dockerfile to include files
        sed -i 's|# COPY v4l2rtspserver|COPY v4l2rtspserver|g' Dockerfile.pi-zero
        sed -i 's|# COPY index.html|COPY index.html|g' Dockerfile.pi-zero
        sed -i 's|# COPY hls.js|COPY hls.js|g' Dockerfile.pi-zero
        sed -i 's|# RUN chmod|RUN chmod|g' Dockerfile.pi-zero
        
        # Build Docker image
        docker build -f Dockerfile.pi-zero -t v4l2rtspserver:pi-zero-latest .
        
        echo "Docker image built successfully!"
        echo "Run with: docker run --rm -p 8554:8554 --device=/dev/video0 v4l2rtspserver:pi-zero-latest /dev/video0"
        EOF
        
        chmod +x build-pi-zero-docker.sh
        
        echo "Docker files created:"
        ls -la Dockerfile.pi-zero build-pi-zero-docker.sh 