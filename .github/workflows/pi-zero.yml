name: Raspberry Pi Zero

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  release:
    types: [ published ]

env:
  BUILD_TYPE: Release

jobs:
  build-pi-zero:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
        - buildtype: Debug
          system: armv6l
          architecture: arm
          crosscompiler: arm-linux-gnueabihf
          cmake_flags: "-mcpu=arm1176jzf-s -mfpu=vfp -mfloat-abi=hard"
          description: "Raspberry Pi Zero (Debug)"
          
        - buildtype: Release  
          system: armv6l
          architecture: arm
          crosscompiler: arm-linux-gnueabihf
          cmake_flags: "-mcpu=arm1176jzf-s -mfpu=vfp -mfloat-abi=hard"
          description: "Raspberry Pi Zero (Release)"

    name: Build for ${{ matrix.description }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          ca-certificates \
          xz-utils \
          cmake \
          make \
          pkg-config \
          git \
          g++-${{ matrix.crosscompiler }} \
          gcc-${{ matrix.crosscompiler }}

    - name: Configure CMake for Pi Zero
      run: |
        mkdir -p build
        cd build
        cmake \
          -DCMAKE_BUILD_TYPE=${{ matrix.buildtype }} \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_SYSTEM_PROCESSOR=${{ matrix.system }} \
          -DCMAKE_C_COMPILER=${{ matrix.crosscompiler }}-gcc \
          -DCMAKE_CXX_COMPILER=${{ matrix.crosscompiler }}-g++ \
          -DCMAKE_C_FLAGS="${{ matrix.cmake_flags }}" \
          -DCMAKE_CXX_FLAGS="${{ matrix.cmake_flags }}" \
          -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
          -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
          -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
          -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=ONLY \
          -DCMAKE_FIND_ROOT_PATH=/usr/${{ matrix.crosscompiler }} \
          -DWITH_SSL=OFF \
          -DALSA=OFF \
          -DSTATICSTDCPP=ON \
          ..

    - name: Build
      run: |
        cd build
        make -j$(nproc)
        ls -la

    - name: Create package
      run: |
        cd build  
        cpack
        ls -la *.deb
        echo "artifactPath=$(ls *.deb | head -1)" >> $GITHUB_ENV
        echo "artifactName=v4l2rtspserver-${{ matrix.system }}-${{ matrix.buildtype }}" >> $GITHUB_ENV

    - name: Test binary
      run: |
        cd build
        file ./v4l2rtspserver
        ${{ matrix.crosscompiler }}-readelf -h ./v4l2rtspserver
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.artifactName }}
        path: build/${{ env.artifactPath }}
        retention-days: 30

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: v4l2rtspserver-binary-${{ matrix.system }}-${{ matrix.buildtype }}
        path: |
          build/v4l2rtspserver
          build/index.html
          build/hls.js
        retention-days: 30

    - name: Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'release'
      with:
        files: |
          build/${{ env.artifactPath }}
          build/v4l2rtspserver
        name: "Pi Zero ${{ matrix.buildtype }} Build"
        tag_name: ${{ github.ref_name }}

  docker-pi-zero:
    runs-on: ubuntu-latest
    needs: build-pi-zero
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: v4l2rtspserver-binary-armv6l-Release
        path: ./artifacts/

    - name: Create Dockerfile for Pi Zero
      run: |
        cat << EOF > Dockerfile.pi-zero
        FROM arm32v6/alpine:latest
        
        # Install runtime dependencies
        RUN apk add --no-cache \\
            libstdc++ \\
            libgcc \\
            ca-certificates
        
        # Copy binary and web files
        COPY artifacts/v4l2rtspserver /usr/local/bin/
        COPY artifacts/index.html /usr/local/share/v4l2rtspserver/
        COPY artifacts/hls.js /usr/local/share/v4l2rtspserver/
        
        # Make binary executable
        RUN chmod +x /usr/local/bin/v4l2rtspserver
        
        # Create user for security
        RUN adduser -D -s /bin/sh v4l2rtsp
        
        # Expose RTSP port
        EXPOSE 8554
        
        # Health check
        HEALTHCHECK --interval=30s --timeout=10s --start-period=5s --retries=3 \\
          CMD pgrep v4l2rtspserver || exit 1
        
        USER v4l2rtsp
        WORKDIR /home/v4l2rtsp
        
        ENTRYPOINT ["/usr/local/bin/v4l2rtspserver"]
        CMD ["-h"]
        EOF

    - name: Build Docker image for Pi Zero
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.pi-zero
        platforms: linux/arm/v6
        tags: |
          v4l2rtspserver:pi-zero-latest
          v4l2rtspserver:pi-zero-${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=docker,dest=/tmp/pi-zero-image.tar

    - name: Upload Docker image
      uses: actions/upload-artifact@v4
      with:
        name: docker-image-pi-zero
        path: /tmp/pi-zero-image.tar
        retention-days: 7 