name: Raspberry Pi Zero

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  release:
    types: [ published ]

env:
  BUILD_TYPE: Release

jobs:
  build-pi-zero:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
        - buildtype: Debug
          system: armv6l
          crosscompiler: arm-linux-gnueabihf
          cmake_flags: "-march=armv6zk -mcpu=arm1176jzf-s -mfpu=vfp -mfloat-abi=softfp -marm"
          description: "Raspberry Pi Zero (Debug)"
          
        - buildtype: Release  
          system: armv6l
          crosscompiler: arm-linux-gnueabihf
          cmake_flags: "-march=armv6zk -mcpu=arm1176jzf-s -mfpu=vfp -mfloat-abi=softfp -marm"
          description: "Raspberry Pi Zero (Release)"

    name: Build for ${{ matrix.description }}

    steps:
    - name: Checkout repository
      run: |
        echo "Cloning repository..."
        git clone --depth=1 ${{ github.server_url }}/${{ github.repository }}.git .
        
        echo "Fetching specific commit..."
        git fetch origin ${{ github.sha }} || echo "Fetch failed, using default branch"
        git checkout ${{ github.sha }} || echo "Checkout failed, using current HEAD"
        
        echo "Initializing submodules..."
        git submodule update --init --depth=1 || {
          echo "Submodule update failed, trying manual init..."
          git submodule init
          git submodule foreach --recursive 'git checkout master || git checkout main || echo "Using default branch"'
        }
        
        echo "Repository cloned successfully"
        ls -la

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          ca-certificates \
          xz-utils \
          cmake \
          make \
          pkg-config \
          git \
          g++-${{ matrix.crosscompiler }} \
          gcc-${{ matrix.crosscompiler }}

    - name: Configure CMake for Pi Zero
      run: |
        mkdir -p build
        cd build
        
        echo "🔧 Configuring CMake for Raspberry Pi Zero ARMv6..."
        echo "Compiler flags: ${{ matrix.cmake_flags }}"
        
        cmake \
          -DCMAKE_BUILD_TYPE=${{ matrix.buildtype }} \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_SYSTEM_PROCESSOR=${{ matrix.system }} \
          -DCMAKE_C_COMPILER=${{ matrix.crosscompiler }}-gcc \
          -DCMAKE_CXX_COMPILER=${{ matrix.crosscompiler }}-g++ \
          -DCMAKE_C_FLAGS="${{ matrix.cmake_flags }}" \
          -DCMAKE_CXX_FLAGS="${{ matrix.cmake_flags }}" \
          -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
          -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
          -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
          -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=ONLY \
          -DCMAKE_FIND_ROOT_PATH=/usr/${{ matrix.crosscompiler }} \
          -DWITH_SSL=OFF \
          -DALSA=OFF \
          -DSTATICSTDCPP=ON \
          ..

    - name: Build
      run: |
        cd build
        echo "🏗️ Building v4l2rtspserver for Pi Zero..."
        make -j$(nproc)
        ls -la

    - name: Create package
      run: |
        cd build  
        
        # Try to create DEB package
        echo "📦 Creating DEB package..."
        cpack || echo "DEB package creation failed, but binary should be ready"
        ls -la *.deb 2>/dev/null || echo "No DEB packages found"
        
        # Prepare artifacts directory
        mkdir -p ../artifacts
        
        # Copy binary and web files
        if [ -f "v4l2rtspserver" ]; then
          cp v4l2rtspserver ../artifacts/
          echo "✅ Binary copied successfully"
        else
          echo "❌ Binary not found!"
          exit 1
        fi
        
        # Copy web files (these should be in parent directory)
        cp ../index.html ../artifacts/ 2>/dev/null || echo "index.html not found in parent directory"
        cp ../hls.js ../artifacts/ 2>/dev/null || echo "hls.js not found in parent directory"
        
        # Copy DEB package if exists
        if ls *.deb 1> /dev/null 2>&1; then
          cp *.deb ../artifacts/
          echo "DEB_PACKAGE=$(ls *.deb | head -1)" >> $GITHUB_ENV
          echo "✅ DEB package copied"
        else
          echo "ℹ️ No DEB package available"
        fi
        
        echo "ARTIFACT_NAME=v4l2rtspserver-${{ matrix.system }}-${{ matrix.buildtype }}" >> $GITHUB_ENV

    - name: Test binary
      run: |
        cd build
        echo "🔍 Testing binary architecture..."
        file ./v4l2rtspserver || echo "❌ Binary test failed"
        ${{ matrix.crosscompiler }}-readelf -h ./v4l2rtspserver || echo "❌ ReadELF test failed"
        
        echo "📏 Binary size:"
        ls -lh ./v4l2rtspserver
        
        echo "🔧 Testing compiler compatibility..."
        echo 'int main(){return 0;}' | ${{ matrix.crosscompiler }}-gcc ${{ matrix.cmake_flags }} -x c - -o test_compile
        file test_compile
        
    - name: Create release archive
      run: |
        cd artifacts
        tar -czf ../v4l2rtspserver-${{ matrix.system }}-${{ matrix.buildtype }}.tar.gz *
        echo "RELEASE_ARCHIVE=v4l2rtspserver-${{ matrix.system }}-${{ matrix.buildtype }}.tar.gz" >> $GITHUB_ENV

    - name: Upload to temporary storage (manual download)
      run: |
        echo "🎉 Build completed successfully!"
        echo ""
        echo "📁 Artifacts created:"
        ls -la artifacts/
        echo ""
        echo "📦 Release archive created:"
        ls -la *.tar.gz
        echo ""
        echo "ℹ️  Artifact details:"
        echo "   - Name: ${{ env.ARTIFACT_NAME }}"
        echo "   - Archive: ${{ env.RELEASE_ARCHIVE }}"
        echo "   - Architecture: ${{ matrix.system }} (${{ matrix.crosscompiler }})"
        echo "   - Build type: ${{ matrix.buildtype }}"
        echo "   - Compiler flags: ${{ matrix.cmake_flags }}"
        echo ""
        echo "🚀 To use on Raspberry Pi Zero:"
        echo "   1. Download the archive from this job"
        echo "   2. Extract: tar -xzf ${{ env.RELEASE_ARCHIVE }}"
        echo "   3. Copy to Pi: scp v4l2rtspserver pi@raspberrypi.local:~/"
        echo "   4. Make executable: chmod +x v4l2rtspserver"
        echo "   5. Run: ./v4l2rtspserver -W 320 -H 240 -F 10 /dev/video0"
        echo ""
        echo "📋 Optimized settings for Pi Zero:"
        echo "   - Low resolution: -W 320 -H 240 -F 10"
        echo "   - MJPEG format: -f MJPG"
        echo "   - With web interface: -w 8080"
        echo ""
        
        # Create a simple upload script for manual use
        cat << 'EOF' > upload_instructions.txt
        🎯 Raspberry Pi Zero Build Instructions
        
        Build completed successfully for ${{ matrix.system }} (${{ matrix.buildtype }})
        
        📋 Files included:
        EOF
        ls -la artifacts/ >> upload_instructions.txt
        echo "" >> upload_instructions.txt
        echo "💡 Quick start commands:" >> upload_instructions.txt
        echo "chmod +x v4l2rtspserver" >> upload_instructions.txt
        echo "./v4l2rtspserver -W 320 -H 240 -F 10 /dev/video0" >> upload_instructions.txt
        echo "./v4l2rtspserver -W 640 -H 480 -F 15 -f MJPG /dev/video0  # Better quality" >> upload_instructions.txt
        echo "./v4l2rtspserver -w 8080 -W 320 -H 240 -F 10 /dev/video0  # With web UI" >> upload_instructions.txt
        
        cat upload_instructions.txt

  create-docker-files:
    runs-on: ubuntu-latest
    needs: build-pi-zero
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout repository
      run: |
        git clone --depth=1 ${{ github.server_url }}/${{ github.repository }}.git .

    - name: Create Docker files for Pi Zero
      run: |
        # Create optimized Dockerfile for Pi Zero
        cat << 'EOF' > Dockerfile.pi-zero
        FROM arm32v6/alpine:latest
        
        # Install runtime dependencies
        RUN apk add --no-cache \
            libstdc++ \
            libgcc \
            ca-certificates \
            tzdata
        
        # Create application directory
        RUN mkdir -p /usr/local/share/v4l2rtspserver/
        
        # Copy binary (you need to manually copy this from artifacts)
        # COPY v4l2rtspserver /usr/local/bin/
        # COPY index.html /usr/local/share/v4l2rtspserver/
        # COPY hls.js /usr/local/share/v4l2rtspserver/
        
        # Make binary executable
        # RUN chmod +x /usr/local/bin/v4l2rtspserver
        
        # Create user for security
        RUN adduser -D -s /bin/sh v4l2rtsp
        
        # Expose RTSP port
        EXPOSE 8554
        
        # Health check
        HEALTHCHECK --interval=30s --timeout=10s --start-period=5s --retries=3 \
          CMD pgrep v4l2rtspserver || exit 1
        
        USER v4l2rtsp
        WORKDIR /home/v4l2rtsp
        
        ENTRYPOINT ["/usr/local/bin/v4l2rtspserver"]
        CMD ["-h"]
        EOF

        # Create build script for Docker
        cat << 'EOF' > build-pi-zero-docker.sh
        #!/bin/bash
        
        echo "🐳 Raspberry Pi Zero Docker Builder"
        echo ""
        echo "📋 Prerequisites:"
        echo "1. Download artifacts from GitHub Actions"
        echo "2. Extract v4l2rtspserver binary, index.html, and hls.js"
        echo "3. Copy them to current directory"
        echo "4. Run this script"
        echo ""
        
        if [ ! -f "v4l2rtspserver" ]; then
            echo "❌ Error: v4l2rtspserver binary not found!"
            echo "📥 Please download it from GitHub Actions artifacts"
            exit 1
        fi
        
        echo "✅ Found v4l2rtspserver binary"
        echo "🔧 Updating Dockerfile..."
        
        # Update Dockerfile to include files
        sed -i 's|# COPY v4l2rtspserver|COPY v4l2rtspserver|g' Dockerfile.pi-zero
        sed -i 's|# COPY index.html|COPY index.html|g' Dockerfile.pi-zero
        sed -i 's|# COPY hls.js|COPY hls.js|g' Dockerfile.pi-zero
        sed -i 's|# RUN chmod|RUN chmod|g' Dockerfile.pi-zero
        
        echo "🏗️  Building Docker image..."
        docker build -f Dockerfile.pi-zero -t v4l2rtspserver:pi-zero-latest .
        
        if [ $? -eq 0 ]; then
            echo "✅ Docker image built successfully!"
            echo ""
            echo "🚀 Usage examples:"
            echo "# Basic run:"
            echo "docker run --rm -p 8554:8554 --device=/dev/video0 v4l2rtspserver:pi-zero-latest /dev/video0"
            echo ""
            echo "# With web interface:"
            echo "docker run --rm -p 8554:8554 -p 8080:8080 --device=/dev/video0 v4l2rtspserver:pi-zero-latest -w 8080 /dev/video0"
            echo ""
            echo "# Low resolution for Pi Zero:"
            echo "docker run --rm -p 8554:8554 --device=/dev/video0 v4l2rtspserver:pi-zero-latest -W 320 -H 240 -F 10 /dev/video0"
        else
            echo "❌ Docker build failed!"
            exit 1
        fi
        EOF
        
        chmod +x build-pi-zero-docker.sh
        
        echo "📁 Docker files created:"
        ls -la Dockerfile.pi-zero build-pi-zero-docker.sh
        
        echo ""
        echo "ℹ️  To build Docker image:"
        echo "1. Download artifacts from the build job"
        echo "2. Run: ./build-pi-zero-docker.sh" 